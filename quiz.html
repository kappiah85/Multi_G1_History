<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quiz — World History Explorer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script>if (sessionStorage.getItem('whe_logged_in') !== 'true') { window.location.replace('login.html'); }</script>
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="brand brand--link">
        <span class="brand__icon" aria-hidden="true">◉</span>
        <div class="brand__text">
          <span class="brand__name">World History Explorer</span>
          <span class="brand__sub">World History Quiz</span>
        </div>
      </a>
      <nav class="site-nav" id="siteMainNav" aria-label="Site pages">
        <a href="index.html" class="site-nav__link">🌍 Globe</a>
        <a href="quiz.html" class="site-nav__link is-active" aria-current="page">🧠 Quiz</a>
        <a href="timeline.html" class="site-nav__link">📅 Timeline</a>
        <a href="map.html" class="site-nav__link">🗺️ Map</a>
        <div class="site-nav__sep" aria-hidden="true"></div>
        <button type="button" id="btnThemeToggle" class="btn btn--sm" aria-pressed="false">☀ Light</button>
      </nav>
      <button
        type="button"
        class="mobile-nav-toggle"
        id="btnMobileNavToggle"
        aria-expanded="false"
        aria-controls="siteMainNav"
        aria-label="Open site menu"
      >
        <span class="mobile-nav-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div id="mobileNavBackdrop" class="mobile-nav-backdrop" hidden></div>

  <main class="page-content">
    <section id="section-quiz" class="quiz-hub" aria-labelledby="quiz-hub-heading">

      <div class="quiz-hub__header">
        <span class="chapter-label" aria-hidden="true">🧠 Test Your Knowledge</span>
        <h2 id="quiz-hub-heading" class="quiz-hub__title">World History Quiz</h2>
        <p class="quiz-hub__intro">
          One question at a time — pick an answer for instant feedback. Wrong? Try again or reveal the answer, then keep going.
        </p>
      </div>

      <div class="quiz-hub__setup">
        <div class="quiz-hub__controls">
          <label class="quiz-hub__select-label">
            <span>Focus region</span>
            <select id="worldQuizScope" class="quiz-hub__select" aria-label="Quiz focus region">
              <option value="">🌐 All continents (mixed)</option>
            </select>
          </label>
          <button
            type="button"
            id="btnQuizSoundToggle"
            class="btn"
            aria-pressed="true"
            aria-label="Turn quiz sound effects off"
          >
            🔊 Sound on
          </button>
        </div>
        <button type="button" id="worldQuizStart" class="btn btn--primary btn--start">
          ▶ Start 5 Questions
        </button>
      </div>

      <div id="worldQuizArea" class="quiz-hub__area" hidden></div>

    </section>
  </main>

  <script type="module" src="js/page-quiz.js"></script>
</body>
</html>
